    <script>
      let fila, columna;
      const intentosRandoms = 3;
      let ultimaFila, ultimaColumna;

      for (var i = 0; i < intentosRandoms; i++) {
        fila = Math.floor(Math.random() * 10);
        columna = Math.floor(Math.random() * 10);
        pintadaInicial(fila, columna);
      }

      function pintadaInicial(ultimaFila, ultimaColumna) {
        const filas = document.querySelectorAll(".fila");
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            let f = ultimaFila + dy;
            let c = ultimaColumna + dx;
            if (f >= 0 && f < 10 && c >= 0 && c < 10) {
              const casilla = filas[f].querySelectorAll(".casilla")[c];

              if (casilla) {
                casilla.classList.remove("blanco");
                casilla.classList.add("negro");
              }
            }
          }
        }
      }

      document.querySelectorAll(".casilla").forEach((casilla, index) => {
        casilla.addEventListener("click", function (event) {
          pintadaInicial(Math.floor(index / 10), index%10 );
        });
      });
    </script>
